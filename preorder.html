<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>BTX — 사전 출시 알림 신청</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: linear-gradient(160deg, #1F3A5F 0%, #142d4f 100%);
      min-height: 100vh;
      max-width: 500px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 28px;
    }

    .back-btn {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-250px);
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.12);
      border: none; border-radius: 50%;
      color: white; font-size: 16px;
      cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      text-decoration: none;
    }
    @media (max-width: 500px) {
      .back-btn { left: 20px; transform: none; }
    }

    .logo {
      font-size: 32px; font-weight: 900; color: white;
      letter-spacing: -1.5px; margin-bottom: 36px; text-align: center;
    }
    .logo span { color: #4A90E2; }

    .card {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 36px 28px;
      text-align: center;
    }

    .icon { font-size: 48px; margin-bottom: 20px; display: block; }

    .title {
      font-size: 22px; font-weight: 800; color: white;
      line-height: 1.45; letter-spacing: -0.5px; margin-bottom: 12px;
    }
    .subtitle {
      font-size: 14px; color: rgba(255,255,255,0.6);
      line-height: 1.7; margin-bottom: 32px;
    }

    .input-wrap { position: relative; margin-bottom: 12px; }
    .email-input {
      width: 100%;
      padding: 16px 20px;
      background: rgba(255,255,255,0.1);
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      font-size: 15px; color: white;
      outline: none;
      transition: border-color 0.2s;
    }
    .email-input::placeholder { color: rgba(255,255,255,0.35); }
    .email-input:focus { border-color: #4A90E2; }

    .submit-btn {
      width: 100%;
      padding: 17px;
      background: #FF5B1B;
      color: white; border: none;
      border-radius: 12px;
      font-size: 16px; font-weight: 700;
      cursor: pointer; letter-spacing: -0.3px;
      transition: opacity 0.15s, transform 0.1s;
    }
    .submit-btn:active { opacity: 0.9; transform: scale(0.99); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg {
      font-size: 12px; color: #FF7070;
      margin-top: 8px; display: none; text-align: left;
    }

    .privacy-note {
      font-size: 11px; color: rgba(255,255,255,0.3);
      margin-top: 14px; line-height: 1.6;
    }

    /* ── 완료 상태 ── */
    .success-state { display: none; text-align: center; }
    .success-icon { font-size: 56px; margin-bottom: 20px; display: block; }
    .success-title {
      font-size: 22px; font-weight: 800; color: white;
      line-height: 1.45; letter-spacing: -0.5px; margin-bottom: 12px;
    }
    .success-sub {
      font-size: 14px; color: rgba(255,255,255,0.6); line-height: 1.7;
    }

    .badges {
      display: flex; gap: 10px; justify-content: center;
      margin-bottom: 28px; flex-wrap: wrap;
    }
    .badge {
      background: rgba(74,144,226,0.18);
      border: 1px solid rgba(74,144,226,0.3);
      color: #7BBDF5;
      font-size: 12px; font-weight: 600;
      padding: 6px 14px; border-radius: 20px;
    }
  </style>
</head>
<body>
  <a href="demo.html" class="back-btn">←</a>

  <div class="logo">BT<span>X</span></div>

  <!-- 신청 폼 -->
  <div class="card" id="form-card">
    <span class="icon">🔔</span>
    <div class="title">가장 먼저<br>알려드릴게요</div>
    <div class="subtitle">
      BTX 출시 시 이메일로 바로 알려드립니다.<br>
      지금 신청하시면 <strong style="color:rgba(255,255,255,0.85);">얼리버드 혜택</strong>도 드릴 예정이에요.
    </div>

    <div class="badges">
      <div class="badge">🚕 혼합 경로 추천</div>
      <div class="badge">🌙 막차 역산</div>
      <div class="badge">💰 비용 최적화</div>
    </div>

    <div class="input-wrap">
      <input
        type="email"
        class="email-input"
        id="email-input"
        placeholder="이메일 주소를 입력해주세요"
        autocomplete="email"
      >
      <div class="error-msg" id="error-msg">올바른 이메일 주소를 입력해주세요.</div>
    </div>
    <button class="submit-btn" id="submit-btn" onclick="handleSubmit()">
      출시 알림 신청하기
    </button>
    <div class="privacy-note">
      입력하신 이메일은 BTX 출시 알림 발송 목적으로만 사용되며,<br>
      제3자에게 제공되지 않습니다.
    </div>
  </div>

  <!-- 완료 상태 -->
  <div class="card success-state" id="success-card">
    <span class="success-icon">🎉</span>
    <div class="success-title">신청 완료!</div>
    <div class="success-sub">
      BTX가 출시되면<br>가장 먼저 알려드릴게요.<br><br>
      <strong style="color:rgba(255,255,255,0.85);">얼리버드 혜택</strong>도 놓치지 마세요!
    </div>
  </div>

  <script src="btx-analytics.js"></script>
  <script>
    btx.track('page_view_preorder');

    function handleSubmit() {
      var input = document.getElementById('email-input');
      var errMsg = document.getElementById('error-msg');
      var btn = document.getElementById('submit-btn');
      var email = input.value.trim();

      /* 간단한 이메일 유효성 검사 */
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        errMsg.style.display = 'block';
        input.focus();
        return;
      }
      errMsg.style.display = 'none';

      btn.disabled = true;
      btn.textContent = '신청 중...';

      btx.saveEmail(email);

      /* 0.6초 후 완료 화면으로 전환 (API 응답 기다리지 않음) */
      setTimeout(function() {
        document.getElementById('form-card').style.display = 'none';
        document.getElementById('success-card').style.display = 'block';
      }, 600);
    }

    /* 엔터키 제출 */
    document.getElementById('email-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleSubmit();
    });
  </script>
</body>
</html>
